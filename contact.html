<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="동물상 연구소 문의 및 제휴 제안 페이지입니다." />
  <meta name="google-adsense-account" content="ca-pub-6131677375870922" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <title>문의하기 | 동물상 연구소</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6131677375870922"
    crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff3ea;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-border: rgba(106, 69, 47, 0.12);
      --text-main: #281911;
      --text-muted: #72584c;
      --accent: #de6c36;
      --accent-hover: #c85925;
      --shadow: 0 22px 44px rgba(93, 56, 36, 0.12);
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #161018;
      --surface: rgba(30, 23, 31, 0.92);
      --surface-border: rgba(255, 255, 255, 0.08);
      --text-main: #fff4ec;
      --text-muted: #cfb7ac;
      --accent: #ff9b68;
      --accent-hover: #ff884c;
      --shadow: 0 24px 52px rgba(0, 0, 0, 0.3);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Pretendard","Noto Sans KR",sans-serif; background:var(--bg); color:var(--text-main); }
    a { color:inherit; text-decoration:none; }
    input, textarea, button { font:inherit; }
    .page { width:min(920px, calc(100% - 32px)); margin:0 auto; padding:24px 0 56px; }
    .topbar, .card {
      background:var(--surface);
      border:1px solid var(--surface-border);
      box-shadow:var(--shadow);
      border-radius:28px;
    }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; padding:14px 18px; margin-bottom:24px; }
    .nav { display:flex; gap:14px; flex-wrap:wrap; }
    .theme-toggle { border:1px solid var(--surface-border); background:transparent; color:var(--text-main); padding:10px 14px; border-radius:999px; cursor:pointer; }
    .card { padding:28px; }
    h1 { margin:0 0 14px; font-size: clamp(34px, 6vw, 52px); letter-spacing:-0.04em; }
    h2 { margin:0 0 10px; font-size:26px; letter-spacing:-0.04em; }
    p { color:var(--text-muted); line-height:1.8; }
    .form { display:grid; gap:14px; margin-top:20px; }
    .field { display:grid; gap:8px; }
    .label { font-weight:700; }
    .input, .textarea {
      width:100%;
      border:1px solid var(--surface-border);
      border-radius:16px;
      background:rgba(255,255,255,0.78);
      color:var(--text-main);
      padding:14px 16px;
    }
    body[data-theme="dark"] .input, body[data-theme="dark"] .textarea { background:rgba(23,18,26,0.86); }
    .textarea { min-height:160px; resize:vertical; }
    .submit {
      min-height:52px;
      border:none;
      border-radius:16px;
      background:var(--accent);
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .submit:hover { background:var(--accent-hover); }
    .hidden-field { display:none; }
    @media (max-width:720px) { .topbar, .nav { display:grid; grid-template-columns:1fr; } .card { padding:22px; } }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div><strong>동물상 연구소</strong></div>
      <nav class="nav">
        <a href="./index.html">홈</a>
        <a href="./animal-face.html">테스트</a>
        <a href="./about.html">사이트 소개</a>
        <a href="./privacy.html">개인정보 처리</a>
        <button class="theme-toggle" id="themeToggleBtn" type="button">다크 모드</button>
      </nav>
    </header>

    <section class="card">
      <h1>문의하기</h1>
      <p>서비스 개선 제안, 제휴 문의, 오류 제보, 정책 문의를 받을 수 있는 페이지입니다. 필요한 정보만 간단히 남기면 확인 후 답변합니다.</p>

      <form class="form" action="https://formspree.io/f/xwvrjnza" method="POST">
        <input type="hidden" name="_subject" value="동물상 연구소 문의" />

        <label class="field">
          <span class="label">이름 또는 회사명</span>
          <input class="input" type="text" name="name" required />
        </label>

        <label class="field">
          <span class="label">이메일</span>
          <input class="input" type="email" name="email" required />
        </label>

        <label class="field">
          <span class="label">문의 유형</span>
          <input class="input" type="text" name="category" placeholder="예: 제휴, 오류 제보, 기능 문의" required />
        </label>

        <label class="field">
          <span class="label">문의 내용</span>
          <textarea class="textarea" name="message" required></textarea>
        </label>

        <div class="hidden-field">
          <label>Leave this field empty<input type="text" name="_gotcha" tabindex="-1" autocomplete="off" /></label>
        </div>

        <button class="submit" type="submit">문의 보내기</button>
      </form>
    </section>
  </main>

  <script>
    const themeStorageKey = "animal-lab-theme";
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");
    function getInitialTheme() {
      const storedTheme = window.localStorage.getItem(themeStorageKey);
      if (storedTheme === "light" || storedTheme === "dark") return storedTheme;
      return prefersDarkScheme.matches ? "dark" : "light";
    }
    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      themeToggleBtn.textContent = theme === "dark" ? "화이트 모드" : "다크 모드";
    }
    function setTheme(theme) {
      window.localStorage.setItem(themeStorageKey, theme);
      applyTheme(theme);
    }
    themeToggleBtn.addEventListener("click", () => {
      setTheme(document.body.dataset.theme === "dark" ? "light" : "dark");
    });
    applyTheme(getInitialTheme());
  </script>
</body>

</html>
